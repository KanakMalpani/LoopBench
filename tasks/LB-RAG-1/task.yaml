# LoopBench task spec — Agentic RAG (ALS v2)
id: LB-RAG-1
slug: lb/agentic-rag-1
name: Agentic RAG
version: 1.0.0
status: stable

loopgym_env: loopbench/rag-retrieval-v1
pattern_slugs:
  - agentic-rag
  - retrieval-loop
  - research-loop

goal:
  g_target: 0.84
  scalar: "0.55 × retrieval_quality + 0.45 × synthesis_quality"
  primary_metric: rag_quality

budget:
  iteration_budget: 6
  wall_clock_minutes: 35
  cost_cap_usd: 0.80

evaluation:
  seeds: [0, 1, 2, 3, 4]
  min_runs_per_instance: 1
  success_at_k: 1
  primary_instances:
    - LB-RAG-1
    - LB-RAG-2

oracle:
  type: llm_rubric
  checks:
    - evaluators.synthesis_rubric

perturbations:
  - id: P1
    name: context_truncation
  - id: P2
    name: corrupted_tool_result
  - id: P3
    name: api_latency
  - id: P4
    name: model_downgrade
  - id: P5
    name: budget_minus_one

les_stress:
  - effectiveness
  - adaptability
  - cost

speed_baselines:
  b_floor_iter_per_s: 0.001
  b_ceiling_iter_per_s: 0.05

cost_baselines:
  b_floor_efficiency: 0.04
  b_ceiling_efficiency: 1.5

safety:
  auto_zero_on:
    - unauthorized_egress

notes: >
  Agentic RAG loops (LlamaIndex, retrieval-augmented agents). Suite: suite-knowledge.
