# LoopBench task spec — Multi-Agent Debate (ALS v2)
id: LB-MA-1
slug: lb/multi-agent-debate-1
name: Multi-Agent Debate
version: 1.0.0
status: stable

loopgym_env: loopbench/multi-agent-debate-v1
pattern_slugs:
  - debate-loop
  - multi-agent-coordination

goal:
  g_target: 0.88
  scalar: "0.40 × balance + 0.60 × actionability"
  primary_metric: consensus_score

budget:
  iteration_budget: 5
  wall_clock_minutes: 60
  cost_cap_usd: 0.60

evaluation:
  seeds: [0, 1, 2, 3, 4]
  min_runs_per_instance: 1
  success_at_k: 1
  primary_instances:
    - ma-001
    - ma-002
    - ma-003

oracle:
  type: llm_rubric
  checks:
    - evaluators.consensus_rubric

perturbations:
  - id: P1
    name: context_truncation
  - id: P2
    name: corrupted_tool_result
  - id: P3
    name: api_latency
  - id: P4
    name: model_downgrade
  - id: P5
    name: budget_minus_one

les_stress:
  - effectiveness
  - autonomy
  - scalability

speed_baselines:
  b_floor_iter_per_s: 0.0005
  b_ceiling_iter_per_s: 0.02

cost_baselines:
  b_floor_efficiency: 0.05
  b_ceiling_efficiency: 2.0

safety:
  auto_zero_on:
    - orchestration_deadlock
    - safety_bypass
