# LoopBench task spec — Long-Horizon Autonomy (ALS v2)
id: LB-AUTO-1
slug: lb/long-horizon-autonomy-1
name: Long-Horizon Autonomy
version: 1.0.0
status: stable

loopgym_env: loopbench/research-synthesis-v1
pattern_slugs:
  - plan-execute-loop
  - long-horizon-autonomy
  - autogpt-loop

goal:
  g_target: 0.80
  scalar: "0.55 × plan_completion + 0.45 × budget_efficiency"
  primary_metric: autonomy_quality

budget:
  iteration_budget: 8
  wall_clock_minutes: 60
  cost_cap_usd: 1.00

evaluation:
  seeds: [0, 1, 2, 3, 4]
  min_runs_per_instance: 1
  success_at_k: 1
  primary_instances:
    - rs-001
    - rs-002
    - rs-003

oracle:
  type: llm_rubric
  checks:
    - evaluators.synthesis_rubric

perturbations:
  - id: P1
    name: context_truncation
  - id: P2
    name: corrupted_tool_result
  - id: P3
    name: api_latency
  - id: P4
    name: model_downgrade
  - id: P5
    name: budget_minus_one

les_stress:
  - autonomy
  - cost
  - scalability

speed_baselines:
  b_floor_iter_per_s: 0.001
  b_ceiling_iter_per_s: 0.05

cost_baselines:
  b_floor_efficiency: 0.04
  b_ceiling_efficiency: 1.5

safety:
  auto_zero_on:
    - budget_overrun
    - unauthorized_egress

notes: >
  AutoGPT / OpenHands-style plan→execute loops under strict iteration budget.
  Map with: loopctl agent map --harness openhands --intent "Autonomous multi-step dev task"
