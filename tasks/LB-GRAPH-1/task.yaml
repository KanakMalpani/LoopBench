# LoopBench task spec — LangGraph Routing (ALS v2)
id: LB-GRAPH-1
slug: lb/langgraph-routing-1
name: LangGraph Routing
version: 1.0.0
status: stable

loopgym_env: loopbench/composed-swarm-v1
pattern_slugs:
  - conditional-routing-loop
  - state-machine-loop
  - parallel-composition

goal:
  g_target: 0.84
  scalar: "0.45 × branch_pass_rate + 0.55 × merge_quality"
  primary_metric: routing_quality

budget:
  iteration_budget: 6
  wall_clock_minutes: 45
  cost_cap_usd: 1.20

evaluation:
  seeds: [0, 1, 2, 3, 4]
  min_runs_per_instance: 1
  success_at_k: 1
  primary_instances:
    - comp-001
    - comp-002
    - comp-003

oracle:
  type: llm_rubric
  checks:
    - evaluators.composite_gate

perturbations:
  - id: P1
    name: context_truncation
  - id: P2
    name: branch_timeout
  - id: P3
    name: api_latency
  - id: P4
    name: model_downgrade
  - id: P5
    name: budget_minus_one

les_stress:
  - effectiveness
  - scalability
  - autonomy

speed_baselines:
  b_floor_iter_per_s: 0.0003
  b_ceiling_iter_per_s: 0.015

cost_baselines:
  b_floor_efficiency: 0.04
  b_ceiling_efficiency: 1.8

safety:
  auto_zero_on:
    - orchestration_deadlock

notes: >
  LangGraph / state-graph loops with parallel branches and merge reducers.
  Map with: loopctl agent map --harness langgraph --intent "Parallel branches with routing"
  Export: loopforge export --target langgraph
