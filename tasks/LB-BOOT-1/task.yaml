# LoopBench task spec — Few-Shot Bootstrap (ALS v2)
id: LB-BOOT-1
slug: lb/few-shot-bootstrap-1
name: Few-Shot Bootstrap
version: 1.0.0
status: stable

loopgym_env: loopbench/research-synthesis-v1
