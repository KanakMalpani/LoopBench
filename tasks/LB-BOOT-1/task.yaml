    - rs-002
    - rs-003

oracle:
  type: llm_rubric
  checks:
    - evaluators.synthesis_rubric

perturbations:
  - id: P1
    name: context_truncation
  - id: P2
    name: corrupted_tool_result
  - id: P3
    name: api_latency
  - id: P4
    name: model_downgrade
  - id: P5
    name: budget_minus_one

les_stress:
  - adaptability
  - cost
  - effectiveness

speed_baselines:
  b_floor_iter_per_s: 0.001
  b_ceiling_iter_per_s: 0.05

cost_baselines:
  b_floor_efficiency: 0.04
  b_ceiling_efficiency: 1.5

safety:
  auto_zero_on:
    - unauthorized_egress

notes: >
  ICL / few-shot bootstrap loops. Suite: suite-knowledge.
