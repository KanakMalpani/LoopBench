loop_name: code-repair-fast
version: 1.0.0

objective: >
  Fast-verify code repair loop targeting primary_quality >= 0.75 within 3 iterations.

inputs:
  schema:
    bug_description:
      type: string
      description: "Natural language description of the bug"
      required: true
      max_length: 2000
    repo_snapshot:
      type: string
      description: "Path or identifier for the repository fixture"
      required: true
  examples:
    - bug_description: "parse_int returns None instead of raising ValueError"
      repo_snapshot: "fixtures/calc-v1"

memory:
  type: ephemeral

workers:
  - id: implementer
    role: "Produce a minimal code patch"
    model:
      provider: openai
      name: gpt-4.1-mini
      temperature: 0.2
    inputs:
      - from: inputs.bug_description
    outputs:
      name: Patch
      format: code
    cost_budget_usd: 0.15

evaluators:
  - id: test_runner
    type: deterministic
    runs_after: [implementer]
    implementation: evaluators.test_pass_rate
  - id: quality_rubric
    type: llm_rubric
    runs_after: [implementer]
    rubric:
      dimensions:
        - name: correctness
          weight: 1.0
          scale: [0, 1]
          criteria: "Patch fixes the bug"
      pass_threshold: 0.75
    model:
      provider: openai
      name: gpt-4.1-mini
      temperature: 0

feedback_channels:
  - id: tests_to_implementer
    source: evaluators.test_runner
    destination: workers.implementer
    format: structured
    fields: [failure_codes, remediation_hints]

optimization_strategy:
  type: prompt_refinement
  max_steps: 3
  config:
    refinement_target: workers.implementer

termination_conditions:
  success:
    - metric: primary_quality
      operator: gte
      value: 0.75
  failure:
    - type: max_iterations
      value: 3
      action: halt
    - type: safety_violation
      action: halt

metrics:
  - name: primary_quality
    primary: true
    definition: "Rubric score"
    source: evaluators.quality_rubric
    unit: ratio
    target: 0.75
  - name: cost_usd
    definition: "Total spend"
    source: telemetry.cost
    unit: usd
    target: 0.30

safety_constraints:
  - id: secret-scan
    type: secret_scan
    scope: post_worker
    applies_to: [implementer]
    action: halt
    severity: S0
    on_error: halt

cost_limits:
  per_iteration_usd: 0.10
  cumulative_usd: 0.30
  on_exceed:
    action: halt
