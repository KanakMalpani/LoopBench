name: Leaderboard render

on:
  push:
    branches: [main]
    paths:
      - leaderboard/entries.json
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: leaderboard-render
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Render LIVE.md and README block
        run: |
          python scripts/render_leaderboard.py \
            --entries leaderboard/entries.json \
            --live-out leaderboard/LIVE.md \
            --readme README.md \
            --site-out docs/data/leaderboard.json \
            --top-n 20

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add leaderboard/LIVE.md README.md docs/data/leaderboard.json
          if git diff --staged --quiet; then
            echo "No leaderboard render changes"
          else
            git commit -m "chore: render live leaderboard"
            git push
          fi
