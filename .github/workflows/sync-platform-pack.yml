name: Sync platform pack

# Pulls docs/ecosystem-sync/LoopBench/ from Loop-Engineering main into this repo.
# No cross-repo secrets required — LoopBench reads the public LE mirror.

on:
  schedule:
    - cron: "15 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: sync-platform-pack
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pull mirror from Loop-Engineering
        run: |
          git clone --depth 1 --branch main \
            https://github.com/KanakMalpani/Loop-Engineering.git /tmp/le
          SRC="/tmp/le/docs/ecosystem-sync/LoopBench"
          test -d "$SRC"

          cp -r "$SRC/scripts/"* scripts/
          cp -r "$SRC/docs/"* docs/
          cp "$SRC/leaderboard/README.md" leaderboard/README.md
          cp "$SRC/leaderboard/ROW_SCHEMA.md" leaderboard/ROW_SCHEMA.md
          # Workflows are not auto-synced — GITHUB_TOKEN cannot push workflow
          # file updates without elevated permissions; merge those via PR.
          echo "$(git -C /tmp/le rev-parse HEAD)" > .platform-pack-source

      - name: Commit if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/ docs/ leaderboard/README.md leaderboard/ROW_SCHEMA.md .platform-pack-source
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Platform pack already up to date"
          else
            if git diff --staged --name-only | grep -q '^docs/'; then
              echo "docs_changed=true" >> "$GITHUB_OUTPUT"
            else
              echo "docs_changed=false" >> "$GITHUB_OUTPUT"
            fi
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git commit -m "chore: sync platform pack from Loop-Engineering"
            git push
          fi

      - name: Redeploy GitHub Pages when site docs changed
        if: steps.commit.outputs.docs_changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run pages.yml --repo "${{ github.repository }}"
