name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - docs/**
      - leaderboard/entries.json
      - leaderboard/LIVE.md
      - scripts/render_leaderboard.py
      - scripts/leaderboard_common.py
  workflow_run:
    workflows: ["Leaderboard render", "Sync platform pack"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Regenerate site data
        run: |
          python scripts/render_leaderboard.py \
            --entries leaderboard/entries.json \
            --site-out docs/data/leaderboard.json \
            --top-n 20

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
