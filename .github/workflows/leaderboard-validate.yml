name: Validate entries

on:
  pull_request:
    paths:
      - leaderboard/entries.json
  push:
    branches: [main]
    paths:
      - leaderboard/entries.json

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install loopbench
        run: pip install -e ".[dev]"

      - name: Validate leaderboard entries
        run: loopbench validate leaderboard/entries.json

      - name: Dry-run render
        run: |
          python scripts/render_leaderboard.py \
            --entries leaderboard/entries.json \
            --live-out /tmp/LIVE.md \
            --site-out /tmp/leaderboard.json \
            --top-n 20
