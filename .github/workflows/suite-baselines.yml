name: Suite baselines (maintainer)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"  # Mondays 06:00 UTC

permissions:
  contents: write

jobs:
  baselines:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: loopbench

      - uses: actions/checkout@v4
        with:
          repository: KanakMalpani/Loop-Engineering
          path: loop-engineering

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install stack
        run: |
          pip install pyyaml jsonschema
          pip install -e ./loop-engineering/loopforge
          pip install -e ./loop-engineering/loopctl --no-deps
          pip install loopbench loopgym

      - name: Run suite baselines
        run: |
          cd loopbench
          python scripts/run_suite_baselines.py

      - name: Commit leaderboard entries
        run: |
          cd loopbench
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add leaderboard/entries.json
          if git diff --staged --quiet; then
            echo "No baseline changes"
          else
            git commit -m "Refresh maintainer suite baselines"
            git push
          fi
